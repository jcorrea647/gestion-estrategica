name: Backup Diario Gestión Estratégica
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: |
          mkdir -p /tmp/backup-deps
          cd /tmp/backup-deps
          npm init -y
          npm install @supabase/supabase-js nodemailer
      - name: Ejecutar backup
        env:
          SUPABASE_URL: https://tykbytaymysxgvyvlgah.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EMAIL_TO: jcorrea@estrategica.cl
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          NODE_PATH: /tmp/backup-deps/node_modules
        run: node .github/scripts/backup.js
      - name: Commit backup al repo
        run: |
          git config --local user.email "backup@gestion-estrategica"
          git config --local user.name "Backup Automatico"
          git add backups/
          if git diff --staged --quiet; then
            echo "Sin cambios para commitear"
            exit 0
          fi
          git commit -m "Backup automatico $(date '+%Y-%m-%d')"
          for i in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin main; then
                echo "✅ Push exitoso (intento $i)"
                exit 0
              fi
            else
              git rebase --abort || true
            fi
            echo "⚠ Push fallido, reintentando ($i/3)..."
            sleep 3
          done
          echo "❌ No se pudo hacer push después de 3 intentos"
          exit 1
